<!DOCTYPE html>
<html lang="en">
<head>
  <title>Welcome | Aurora Horizon</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: radial-gradient(circle at 20% 30%, #1a1e2f, #0b0d17);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      margin: 0;
      position: relative;
      overflow-x: hidden;
    }

    /* Subtle animated gradient overlay */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 70% 60%, rgba(120, 100, 255, 0.12) 0%, transparent 50%),
                  radial-gradient(ellipse at 30% 20%, rgba(80, 200, 210, 0.08) 0%, transparent 55%);
      pointer-events: none;
      z-index: 0;
    }

    .welcome-card {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 780px;
      background: rgba(18, 22, 35, 0.75);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 3rem;
      padding: 3rem 2.5rem;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.08) inset;
      text-align: center;
      color: #f0f2fa;
      transition: transform 0.3s ease, box-shadow 0.4s ease;
    }

    .welcome-card:hover {
      box-shadow: 0 40px 70px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(255, 255, 255, 0.15) inset;
      transform: translateY(-4px);
    }

    .icon-wrapper {
      background: linear-gradient(135deg, rgba(140, 130, 255, 0.18), rgba(90, 200, 230, 0.15));
      width: 90px;
      height: 90px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.8rem;
      border-radius: 28px;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 20px 35px -12px rgba(80, 100, 255, 0.4);
      transition: all 0.25s;
    }

    .icon-wrapper svg {
      width: 48px;
      height: 48px;
      fill: none;
      stroke: #c7d2ff;
      stroke-width: 1.8;
      filter: drop-shadow(0 4px 8px rgba(120, 140, 255, 0.6));
    }

    h1 {
      font-size: clamp(2.4rem, 8vw, 3.6rem);
      font-weight: 600;
      letter-spacing: -0.5px;
      background: linear-gradient(to right, #eef0ff, #b9c6ff, #9ad8f0);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 1rem;
      line-height: 1.2;
      text-shadow: 0 2px 12px rgba(0, 160, 255, 0.3);
    }

    .subtitle {
      font-size: 1.3rem;
      font-weight: 400;
      color: rgba(220, 225, 250, 0.8);
      margin-bottom: 2.2rem;
      line-height: 1.6;
      max-width: 460px;
      margin-left: auto;
      margin-right: auto;
      background: linear-gradient(135deg, #cfd9ff, #b0d0ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .highlight {
      font-weight: 600;
      background: linear-gradient(120deg, #c7b3ff, #6bb8ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .divider {
      width: 70px;
      height: 4px;
      background: linear-gradient(90deg, #7180ff, #3ec1e6, #7180ff);
      border-radius: 4px;
      margin: 0.8rem auto 2.2rem;
      opacity: 0.8;
      background-size: 200% 100%;
      animation: shimmer 3s infinite ease-in-out;
    }

    @keyframes shimmer {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .cta-group {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 1.2rem;
      margin: 2rem 0 1.8rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.9rem 2.2rem;
      border-radius: 3rem;
      font-weight: 550;
      font-size: 1.05rem;
      letter-spacing: 0.2px;
      text-decoration: none;
      transition: all 0.3s ease;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.25);
      color: #e0e6ff;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      cursor: pointer;
    }

    .btn-primary {
      background: linear-gradient(125deg, #4f5ef0, #2a9ad9);
      border: 1px solid rgba(255, 255, 255, 0.3);
      color: white;
      box-shadow: 0 10px 22px -8px rgba(30, 100, 220, 0.5);
      font-weight: 600;
    }

    .btn-primary:hover {
      background: linear-gradient(125deg, #6576ff, #35b0ea);
      box-shadow: 0 14px 28px -6px rgba(60, 130, 255, 0.65);
      border-color: rgba(255, 255, 255, 0.5);
      transform: scale(1.04);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 255, 255, 0.45);
      color: white;
      transform: translateY(-2px);
      box-shadow: 0 12px 24px -10px rgba(180, 200, 255, 0.3);
    }

    .btn svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
    }

    .feature-list {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 2rem 2.5rem;
      margin-top: 2.5rem;
      color: #b7c2f0;
      font-size: 0.95rem;
      font-weight: 450;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      padding-top: 2rem;
    }

    .feature-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      letter-spacing: 0.2px;
    }

    .feature-item span {
      background: rgba(255, 255, 255, 0.07);
      padding: 0.25rem 0.6rem;
      border-radius: 20px;
      color: #cad6ff;
    }

    .dot {
      width: 8px;
      height: 8px;
      background: #51c8ff;
      border-radius: 50%;
      display: inline-block;
      box-shadow: 0 0 12px #2f8cff;
    }

    @media (max-width: 500px) {
      .welcome-card {
        padding: 2.5rem 1.5rem;
        border-radius: 2.2rem;
      }
      .cta-group {
        flex-direction: column;
        width: 100%;
      }
      .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="welcome-card">
    <!-- Abstract welcome icon (minimalist layered design) -->
    <div class="icon-wrapper" aria-hidden="true">
      <svg viewBox="0 0 24 24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2L2 7l10 5 10-5-10-5z" />
        <path d="M2 17l10 5 10-5" />
        <path d="M2 12l10 5 10-5" />
      </svg>
    </div>

    <h1>Welcome Joseph Blaise</h1>
    <p class="subtitle">
      Your space for <span class="highlight">creative clarity</span> and effortless collaboration.
      <br/>Discover a place where ideas flow.
    </p>

    <div class="divider" role="presentation"></div>

    <div class="cta-group">
      <a href="#" class="btn btn-primary">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <path d="M15 3h6v6M10 14 21 3M21 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h6" />
        </svg>
        Get started free
      </a>
      <a href="#" class="btn btn-secondary">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <circle cx="12" cy="12" r="10" />
          <polygon points="10 8 16 12 10 16 10 8" />
        </svg>
        Watch demo
      </a>
    </div>

    <div class="feature-list">
      <div class="feature-item">
        <span class="dot"></span> Real-time sync
      </div>
      <div class="feature-item">
        <span class="dot"></span> End-to-end encrypted
      </div>
      <div class="feature-item">
        <span class="dot"></span> AI assisted tools
      </div>
    </div>
  </main>
</body>
</html>
